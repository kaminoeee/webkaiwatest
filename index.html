<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試験的P2Pビデオ通話</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-6xl text-center flex flex-col gap-6">
        <h1 class="text-2xl font-bold text-gray-800">試験的P2Pビデオ通話</h1>

        <div id="setup-area" class="p-4 bg-gray-50 rounded-xl flex flex-col items-center justify-center gap-4 border border-gray-200">
            <div class="flex flex-col md:flex-row gap-4 w-full justify-center">
                <input id="room-id-input" type="text" placeholder="部屋番号（例: abc123）" class="border border-gray-300 rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center font-bold">
                <button id="join-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-lg transition w-full md:w-auto">部屋に入る</button>
            </div>
            <p class="text-xs text-gray-400">※お互いに同じ部屋番号を入力してください。</p>
        </div>

        <div id="status-area" class="p-3 bg-blue-50 rounded-xl border border-blue-200 hidden">
            <p class="text-sm text-gray-600">
                部屋: <span id="current-room-id" class="font-bold text-blue-600"></span> 
                （あなたは <span id="user-role" class="font-bold text-purple-600">接続中...</span> です）
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 text-left">
            
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                        <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner flex-1">
                            <video id="local-video" autoplay muted playsinline class="w-full h-full object-cover"></video>
                            <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">あなた</span>
                        </div>
                        <div class="w-5 h-32 bg-gray-200 rounded-full overflow-hidden relative flex flex-col justify-end p-0.5 border border-gray-300">
                            <div id="volume-bar" class="w-full bg-green-500 rounded-full transition-all duration-75" style="height: 0%;"></div>
                        </div>
                    </div>

                    <div class="flex items-center bg-gray-50 p-3 rounded-xl border border-gray-200">
                        <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner flex-1">
                            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                            <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">相手</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center flex-wrap gap-2">
                    <button id="toggle-video-btn" class="bg-gray-700 hover:bg-gray-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">カメラOFF</button>
                    <button id="toggle-audio-btn" class="bg-gray-700 hover:bg-gray-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">マイクMUTE</button>
                    <button id="share-screen-btn" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition hidden md:inline-block">画面共有</button>
                </div>

                <div class="mt-4 mx-auto w-full max-w-lg bg-amber-50 border border-amber-200 p-5 rounded-xl shadow-xs text-center">
                    <p class="text-sm font-bold text-amber-700 mb-1">🎁 開発者を応援する（匿名で送れます）</p>
                    <p class="text-xs text-gray-600 leading-relaxed mb-4">
                        サイトを気に入ったら、Amazonギフトカード（15円〜）でジュースをおごっていただけると励みになります！<br>
                        宛先メールアドレス：
                        <span id="target-email" class="font-mono font-bold text-blue-600 bg-white px-1.5 py-0.5 border border-gray-300 rounded cursor-pointer hover:bg-gray-50 transition" title="クリックでコピー">
                            kaminoeee@gmail.com
                        </span>
                    </p>
                    <button id="amajif-btn" class="w-full sm:w-auto bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-6 py-2.5 rounded-lg shadow-xs transition-all cursor-pointer">
                        アドレスをコピーしてAmazonを開く ↗
                    </button>
                </div>

            </div>

            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 flex flex-col h-80 lg:h-auto min-h-[300px]">
                <h3 class="font-bold text-gray-700 text-sm mb-2 border-b pb-1">　チャット</h3>
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 mb-3 text-sm p-2 bg-white rounded-lg border border-gray-100"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="メッセージを入力..." class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm flex-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="send-chat-btn" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-1.5 rounded-lg transition">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // ---HTMLの要素をJavaScriptで操作できるように取得する。 ---
        const roomIdInput = document.getElementById('room-id-input');
        const joinBtn = document.getElementById('join-btn');
        const setupArea = document.getElementById('setup-area');
        const statusArea = document.getElementById('status-area');
        const currentRoomIdEl = document.getElementById('current-room-id');
        const userRoleEl = document.getElementById('user-role');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const volumeBar = document.getElementById('volume-bar');
        const toggleVideoBtn = document.getElementById('toggle-video-btn');
        const toggleAudioBtn = document.getElementById('toggle-audio-btn');
        const shareScreenBtn = document.getElementById('share-screen-btn');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const sendChatBtn = document.getElementById('send-chat-btn');
        const targetEmail = document.getElementById('target-email');
        const amajifBtn = document.getElementById('amajif-btn');

        // --- 通話の状態を管理する変数↓（グローバル変数を使用） ---
        let localStream = null;     // 自分のカメラ・マイクのデータストリーム
        let screenStream = null;    // 画面共有のデータストリーム
        let peer = null;            // PeerJSの本体インスタンス
        let dataConnection = null;  // チャット（テキストデータ）用の通信用リンク
        let currentCall = null;     // ビデオ通話用の通信用リンク
        let videoEnabled = true;    // カメラのON/OFF状態（trueがON）
        let audioEnabled = true;    // マイクのON/OFF状態（trueがON）
        const emailText = "kaminoeee@gmail.com"; // 応援用の宛先メールアドレス

        // ==========================================
        // [初期化]カメラとマイクの許可を取得して起動する。
        // ==========================================
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;           // 取得した映像・音声をデータに保存する。
                localVideo.srcObject = stream;  // 自分の画面（HTMLのvideoタグ）に映す
                startVolumeMeter(stream);       // 音量メーターの処理を動かし始めるする。
            })
            .catch(err => {
                alert('カメラ・マイクの許可が必要です。ブラウザの設定で許可してください。');
                console.error(err);
            });

        // ===================================================
        // [中心部]部屋に入るボタン（自動でホストかゲストか仕分けする。）
        // ==================================================
        joinBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim(); // 入力された文字を取得（前後の空白を削除）
            if (!roomId) return alert('部屋番号を入力してください。');

            // 画面の表示を「通話中」に切り替える
            setupArea.classList.add('hidden');
            statusArea.classList.remove('hidden');
            currentRoomIdEl.textContent = roomId;

            // まずは自分が1人目の「ホスト（親）」として部屋を作る
            // 部屋番号の末尾に「-room-host」をつけて、PeerJSサーバー上で自分専用の固定IDとして登録をする。（試みる）
            peer = new Peer(roomId + "-room-host");

            // ▼無事に「ホスト」として部屋を作れた（自分が1人目の入室者だった）場合の処理
            peer.on('open', () => {
                userRoleEl.textContent = "部屋の作成者（ホスト）";
                
                // 後から入ってくる参加者（ゲスト）からの「ビデオ着信」を待ち受ける
                peer.on('call', (call) => {
                    currentCall = call;
                    call.answer(localStream); // 自分の映像・音声を相手に返して通話開始
                    call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; }); // 相手の映像を右画面に表示
                });

                // 後から入ってくる参加者からの「チャットの接続」を待ち受ける
                peer.on('connection', (conn) => {
                    dataConnection = conn;
                    setupChatReceiver(); // チャットが届いた時の処理をセット
                });
            });

            // ▼【第二作戦】もしエラーが発生した場合（すでに同じ名前のホストがいた場合）の処理
            peer.on('error', (err) => {
                // 'unavailable-id' は「そのID（ホスト）はすでに使われています」というエラー
                if (err.type === 'unavailable-id') {
                    peer.destroy(); // 失敗したホストとしての接続を綺麗さっぱり消去
                    
                    // 自分は2人目の「参加者（ゲスト）」として新しくランダムなIDでPeerを作り直す
                    peer = new Peer();
                    
                    peer.on('open', () => {
                        userRoleEl.textContent = "参加者（ゲスト）";

                        // 先に入って待っているホスト（部屋名-room-host）に向かって「ビデオ通話」を発信
                        const call = peer.call(roomId + "-room-host", localStream);
                        currentCall = call;
                        call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; });

                        // 先に入って待っているホストに向かって「チャットの回線」を接続
                        dataConnection = peer.connect(roomId + "-room-host");
                        setupChatReceiver(); // チャットが届いた時の処理をセット
                    });
                } else {
                    console.error("その他の通信エラー:", err);
                }
            });
        });

        // ==========================================
        //[機能]リアルタイムチャット
        // =========================================
        
        // 相手から文字メッセージを受信したときの処理
        function setupChatReceiver() {
            dataConnection.on('data', (data) => {
                // 受信した文字を「相手」としてチャット欄の左側（灰色）に表示
                appendMessage("相手", data, "bg-gray-200 text-gray-800 self-start");
            });
        }

        // 自分が文字を送信するときの処理
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !dataConnection) return; //まだ誰もいないときは何もしない

            dataConnection.send(text); // 相手に文字データを送信
            // 自分の送信した文字をチャット欄の右側（青色）に表示
            appendMessage("あなた", text, "bg-blue-600 text-white self-end ml-auto");
            chatInput.value = ""; // 入力欄を空にする
        }

        // 送信ボタンクリック、またはEnterキーが押されたら送信を実行
        sendChatBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        // チャット画面に吹き出しを追加する補助関数
        function appendMessage(sender, text, msgClass) {
            const msgWrap = document.createElement('div');
            msgWrap.className = `flex flex-col w-max max-w-[80%] ${msgClass.includes('ml-auto') ? 'ml-auto' : ''}`;
            
            const nameSpan = document.createElement('span');
            nameSpan.className = "text-[10px] text-gray-400 mb-0.5 " + (msgClass.includes('ml-auto') ? 'text-right' : '');
            nameSpan.textContent = sender;

            const msgDiv = document.createElement('div');
            msgDiv.className = `px-3 py-1.5 rounded-2xl shadow-sm text-sm break-all ${msgClass}`;
            msgDiv.textContent = text;

            msgWrap.appendChild(nameSpan);
            msgWrap.appendChild(msgDiv);
            chatBox.appendChild(msgWrap);
            chatBox.scrollTop = chatBox.scrollHeight; // 新しいメッセージが来たら自動で一番下までスクロール
        }

        // ==========================================
        // [機能]画面共有（※PCブラウザのみ機能する。）
        // ==========================================
        shareScreenBtn.addEventListener('click', async () => {
            if (!screenStream) {
                try {
                    // ブラウザの画面キャプチャ機能（画面選択ポップアップ）を起動
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    localVideo.srcObject = screenStream; // 自分の左画面をカメラから画面共有に切り替える
                    shareScreenBtn.textContent = "🛑 共有停止";
                    shareScreenBtn.classList.replace('bg-purple-600', 'bg-red-600');

                    // 現在通話中の相手がいる場合、送信している映像の「線（トラック）」をカメラから画面に差し替える
                    if (currentCall) {
                        const videoTrack = screenStream.getVideoTracks()[0];
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }

                    // ユーザーがブラウザ標準の「共有停止」ボタンを押して終了したときの後処理
                    screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
                } catch (err) {
                    console.error("画面共有がキャンセル、または失敗:", err);
                }
            } else {
                stopScreenShare(); // すでに共有中なら停止関数を呼ぶ
            }
        });

        // 画面共有を停止して、通常のカメラ映像に戻す関数
        function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop()); // 画面共有のシステムを完全に止める
                screenStream = null;
            }
            localVideo.srcObject = localStream; // 自分の左画面をカメラ映像に戻す
            shareScreenBtn.textContent = "🖥️ 画面共有";
            shareScreenBtn.classList.replace('bg-red-600', 'bg-purple-600');

            // 相手に送っている映像の「線（トラック）」をカメラ映像に戻す
            if (currentCall) {
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
        }

        // ==========================================
        // [機能]カメラ・マイクのON / OFF切り替え
        // ==========================================
        
        // カメラのON/OFF
        toggleVideoBtn.addEventListener('click', () => {
            if (localStream) {
                videoEnabled = !videoEnabled; // 状態を反転
                localStream.getVideoTracks()[0].enabled = videoEnabled; // 映像データの送信をON/OFF
                toggleVideoBtn.textContent = videoEnabled ? "🎥 カメラOFF" : "🎥 カメラON";
                toggleVideoBtn.classList.toggle('bg-red-600', !videoEnabled); // OFFの時はボタンを赤くする
            }
        });

        // マイクのMUTE/解除
        toggleAudioBtn.addEventListener('click', () => {
            if (localStream) {
                audioEnabled = !audioEnabled; // 状態を反転
                localStream.getAudioTracks()[0].enabled = audioEnabled; // 音声データの送信をON/OFF
                toggleAudioBtn.textContent = audioEnabled ? "🎤 マイクMUTE" : "🎤 マイクON";
                toggleAudioBtn.classList.toggle('bg-red-600', !audioEnabled); // MUTEの時はボタンを赤くする
            }
        });

        // ==========================================
        // [機能]音量メーター
        // ==========================================
        function startVolumeMeter(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream); // マイクの音を解析の源に設定
            source.connect(analyser);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength); // 音声データを格納する配列

            // リアルタイムで音量をループ計算する関数
            function updateMeter() {
                analyser.getByteFrequencyData(dataArray); // 現在の一瞬の音量データを取得
                
                // データの波を平均化して、大体の音量を算出する
                let total = 0;
                for (let i = 0; i < bufferLength; i++) { total += dataArray[i]; }
                const average = total / bufferLength;
                
                // 音量の数値を0〜100%のパーセンテージに変換
                const volumePercent = Math.min(100, Math.floor((average / 128) * 100));
                
                // HTML上の音量バーの高さをCSSで滑らかに変える
                volumeBar.style.height = volumePercent + "%";
                
                // 音量の大きさに応じてバーの色を「緑 ➔ 黄 ➔ 赤」に切り替える
                if(volumePercent > 70) volumeBar.className = "w-full bg-red-500 rounded-full transition-all duration-75";
                else if(volumePercent > 40) volumeBar.className = "w-full bg-yellow-500 rounded-full transition-all duration-75";
                else volumeBar.className = "w-full bg-green-500 rounded-full transition-all duration-75";
                
                // ブラウザの描画タイミングに合わせて無限ループさせる処理
                requestAnimationFrame(updateMeter);
            }
            updateMeter();
        }

        // ==========================================
        //  [乞食]乞食用コード（他のリポジトリからコピペ）
        // ==========================================
        
        // メールアドレスの部分をクリックした時にクリップボードへコピー
        targetEmail.addEventListener('click', () => {
            navigator.clipboard.writeText(emailText);
            alert('メールアドレスをコピーしました！');
        });

        // オレンジのボタンを押した時に「コピー ➔ Amazonを開く」を同時に行う処理
        amajifBtn.addEventListener('click', () => {
            // 文字列をクリップボードにコピー
            navigator.clipboard.writeText(emailText).then(() => {
                // コピー成功時にボタンのテキストと色を変える演出
                amajifBtn.textContent = "コピーしました！Amazonへ移動します...";
                amajifBtn.classList.replace('bg-amber-500', 'bg-green-600');
                
                // 1秒間の余韻を持たせてから、別タブでAmazonギフト券の購入ページを開く
                setTimeout(() => {
                    window.open('https://www.amazon.co.jp/dp/B004N3APOM', '_blank');
                    // ボタンの状態を元に戻す
                    amajifBtn.textContent = "アドレスをコピーしてAmazonを開く ↗";
                    amajifBtn.classList.replace('bg-green-600', 'bg-amber-500');
                }, 1000);
            }).catch(err => {
                // スマホのブラウザ等で万が一コピーに失敗した場合は、そのままAmazonのページだけ開く
                // このコードを見てる人へこのコードはhtmlファイルとして機能します。
                // このコードをコピペしてhtmlファイルとして開けばそのまま動きます。
                //　このコードはフリーです。自由に配布・改造してください。
                //　このコードを作成したのは2026/9/28/21:17分頃（これを書いてる時刻）です。中１なのでタイプミスあるかもしれません...
                //　youtubeのチャンネル登録お願いします。↓のやつ..
                //https://www.youtube.com/@eee%E3%81%AE%E4%B8%8D%E6%80%9D%E8%AD%B0%E3%81%AA%E6%97%A5%E8%A8%98
                // by.eeeの不思議な日記アンドeeeボール
                window.open('https://www.amazon.co.jp/dp/B004N3APOM', '_blank');
            });
        });
    </script>
</body>
</html>

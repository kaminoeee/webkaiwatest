<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試験的 P2P ルーム通話</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-5xl text-center">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">🌐 P2P ルーム通話 (安定版)</h1>

        <div id="setup-area" class="mb-6 p-4 bg-gray-50 rounded-xl flex flex-col items-center justify-center gap-4">
            <div class="flex flex-col md:flex-row gap-4 w-full justify-center">
                <input id="room-id-input" type="text" placeholder="部屋番号（例: room123）" class="border border-gray-300 rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center font-bold">
                <button id="join-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-lg transition w-full md:w-auto">部屋を作成/入室</button>
            </div>
        </div>

        <div id="status-area" class="mb-6 p-4 bg-blue-50 rounded-xl border border-blue-200 hidden text-center">
            <p class="text-sm text-gray-600 mb-2">部屋: <span id="current-room-id" class="font-bold text-blue-600"></span> に参加中</p>
            <p class="text-xs text-gray-500 mb-1">相手にこのURLを共有してください：</p>
            <input id="share-url" type="text" readonly class="bg-white border border-gray-300 rounded text-center px-2 py-1 text-xs w-full max-w-md font-mono select-all">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-xl border border-gray-200">
                <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner flex-1">
                    <video id="local-video" autoplay muted playsinline class="w-full h-full object-cover"></video>
                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">あなた</span>
                </div>
                <div class="w-6 h-32 md:h-48 bg-gray-200 rounded-full overflow-hidden relative flex flex-col justify-end p-0.5 border border-gray-300">
                    <div id="volume-bar" class="w-full bg-green-500 rounded-full transition-all duration-75" style="height: 0%;"></div>
                </div>
            </div>

            <div class="flex items-center bg-gray-50 p-3 rounded-xl border border-gray-200">
                <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner flex-1">
                    <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">相手</span>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-center gap-4">
            <button id="toggle-video-btn" class="bg-gray-700 hover:bg-gray-800 text-white font-semibold px-4 py-2 rounded-lg transition">🎥 カメラOFF</button>
            <button id="toggle-audio-btn" class="bg-gray-700 hover:bg-gray-800 text-white font-semibold px-4 py-2 rounded-lg transition">🎤 マイクMUTE</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const roomIdInput = document.getElementById('room-id-input');
        const joinBtn = document.getElementById('join-btn');
        const setupArea = document.getElementById('setup-area');
        const statusArea = document.getElementById('status-area');
        const currentRoomIdEl = document.getElementById('current-room-id');
        const shareUrlInput = document.getElementById('share-url');
        
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const volumeBar = document.getElementById('volume-bar');
        
        const toggleVideoBtn = document.getElementById('toggle-video-btn');
        const toggleAudioBtn = document.getElementById('toggle-audio-btn');

        let localStream = null;
        let peer = null;
        let videoEnabled = true;
        let audioEnabled = true;

        // 1. 最初からカメラとマイクの許可を取得＆音量メーター開始
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                localVideo.srcObject = stream;
                startVolumeMeter(stream);

                // URLにすでに部屋番号（?room=xxx）が含まれていれば、自動入室する（スマホ対策）
                const urlParams = new URLSearchParams(window.location.search);
                const roomParam = urlParams.get('room');
                if (roomParam) {
                    roomIdInput.value = roomParam;
                    // スマホのタップ制限回避のため、少しだけ遅らせて自動実行
                    setTimeout(() => startSession(roomParam), 500);
                }
            })
            .catch(err => {
                alert('カメラ・マイクの許可が必要です。ブラウザの設定を確認してください。');
                console.error(err);
            });

        // ボタンクリックでの入室
        joinBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim();
            if (!roomId) return alert('部屋番号を入力してください。');
            startSession(roomId);
        });

        // 2. 通話セッションの開始（ここが安定化の肝）
        function startSession(roomId) {
            setupArea.classList.add('hidden');
            statusArea.classList.remove('hidden');
            currentRoomIdEl.textContent = roomId;

            // 招待用URLを生成して表示
            const shareUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            shareUrlInput.value = shareUrl;

            // URLのパラメータから自分がホスト（1人目）かゲスト（2人目）かを自動判定
            // 最初にURLを踏んだPCが「ホスト」、そのURLを貰って開いたスマホが「ゲスト」になります
            const urlParams = new URLSearchParams(window.location.search);
            const isGuest = urlParams.has('room');

            if (!isGuest) {
                // 【PC / ホスト側】待ち受け用の固定IDを作成
                peer = new Peer(roomId + "-host");

                // ゲストからの着信を待つ
                peer.on('call', (call) => {
                    call.answer(localStream);
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                    });
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        alert('この部屋番号はすでに使われています。別の番号にしてください。');
                        location.reload();
                    }
                });
            } else {
                // 【スマホ / ゲスト側】ランダムなIDで起動し、ホストに発信する
                peer = new Peer();
                peer.on('open', () => {
                    // ホスト（PC側）に向かって発信
                    const call = peer.call(roomId + "-host", localStream);
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                    });
                });
            }
        }

        // 3. カメラのON/OFF切り替え
        toggleVideoBtn.addEventListener('click', () => {
            if (localStream) {
                videoEnabled = !videoEnabled;
                localStream.getVideoTracks()[0].enabled = videoEnabled;
                toggleVideoBtn.textContent = videoEnabled ? "🎥 カメラOFF" : "🎥 カメラON";
                toggleVideoBtn.classList.toggle('bg-red-600', !videoEnabled);
            }
        });

        // 4. マイクのON/OFF切り替え
        toggleAudioBtn.addEventListener('click', () => {
            if (localStream) {
                audioEnabled = !audioEnabled;
                localStream.getAudioTracks()[0].enabled = audioEnabled;
                toggleAudioBtn.textContent = audioEnabled ? "🎤 マイクMUTE" : "🎤 マイクON";
                toggleAudioBtn.classList.toggle('bg-red-600', !audioEnabled);
            }
        });

        // 5. 音量メーター（オーディオビジュアライザ）
        function startVolumeMeter(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function updateMeter() {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < bufferLength; i++) { total += dataArray[i]; }
                const average = total / bufferLength;
                const volumePercent = Math.min(100, Math.floor((average / 128) * 100));
                
                volumeBar.style.height = volumePercent + "%";
                if(volumePercent > 70) {
                    volumeBar.className = "w-full bg-red-500 rounded-full transition-all duration-75";
                } else if(volumePercent > 40) {
                    volumeBar.className = "w-full bg-yellow-500 rounded-full transition-all duration-75";
                } else {
                    volumeBar.className = "w-full bg-green-500 rounded-full transition-all duration-75";
                }
                requestAnimationFrame(updateMeter);
            }
            updateMeter();
        }
    </script>
</body>
</html>

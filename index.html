<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2Pビデオ会話テスト</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-4xl text-center">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">🌐 P2P ビデオ通話 (PeerJS)</h1>

        <div class="mb-6 p-4 bg-gray-50 rounded-xl flex flex-col md:flex-row items-center justify-around gap-4">
            <div>
                <p class="text-sm text-gray-500">あなたのID:</p>
                <p id="my-id" class="text-lg font-mono font-bold text-blue-600">接続中...</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input id="peer-id-input" type="text" placeholder="相手のIDを入力" class="border border-gray-300 rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="call-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-lg transition">発信</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner">
                <video id="local-video" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">あなた</span>
            </div>
            <div class="relative bg-black rounded-xl overflow-hidden aspect-video shadow-inner">
                <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">相手</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const myIdEl = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const callBtn = document.getElementById('call-btn');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');

        let localStream = null;
        let peer = null;

        // 1. カメラとマイクの許可を取得
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                localVideo.srcObject = stream;

                // 2. カメラ準備ができたらPeerJSサーバーに接続
                // 引数を空にすると、PeerJSが提供する無料の公衆シグナリングサーバーに繋がります
                peer = new Peer();

                // 自分のIDが発行されたとき
                peer.on('open', (id) => {
                    myIdEl.textContent = id;
                });

                // 3. 相手から着信があったときの処理
                peer.on('call', (call) => {
                    // 自分の映像・音声を相手に返す
                    call.answer(localStream);
                    // 相手の映像が送られてきたら画面にセット
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                    });
                });
            })
            .catch(err => {
                alert('カメラまたはマイクの許可がありません。');
                console.error(err);
            });

        // 4. 自分から発信するときの処理
        callBtn.addEventListener('click', () => {
            const peerId = peerIdInput.value.trim();
            if (!peerId) {
                alert('相手のIDを入力してください。');
                return;
            }

            // 相手のIDに対して、自分のストリームを送信
            const call = peer.call(peerId, localStream);
            
            // 相手が応答して、相手の映像が送られてきたら画面にセット
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
